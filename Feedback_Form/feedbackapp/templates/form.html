<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .form-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .form-control {
            background-color: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-radius: 10px;
            padding: 12px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2) !important;
            border-color: #6366f1 !important;
        }
        .btn-submit {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            border: none;
            color: white !important;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        .link-view {
            color: #a5b4fc;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .link-view:hover {
            color: #c7d2fe;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="form-card text-center">
        <h2 class="fw-bold text-white mb-2">Share Your Feedback</h2>
        <p class="text-muted small mb-4">We value your thoughts and suggestions</p>

        <form method="POST" class="text-start">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-secondary small text-uppercase tracking-wider font-weight-bold">Your Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g., Manisha" required>
            </div>

            <div class="mb-4">
                <label class="form-label text-secondary small text-uppercase tracking-wider font-weight-bold">Your Message</label>
                <textarea name="feedback" rows="4" class="form-control" placeholder="Type your feedback here..." style="resize: none;" required></textarea>
            </div>

            <button type="submit" class="btn-submit w-100 mb-3">Submit Feedback</button>
        </form>

        <div class="text-muted small my-3">— or —</div>
        
        <a href="/feedbackapp/feedback/" class="link-view">View All Feedbacks →</a>

        {% if submitted %}
        <div class="alert alert-success mt-3 py-2 small border-0 bg-success bg-opacity-10 text-success text-center" role="alert">
            Feedback submitted successfully!
        </div>
        {% endif %}
    </div>

</body>
</html>
